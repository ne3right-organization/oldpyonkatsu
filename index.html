<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="10;url=https://map.usapo.net/">
  <meta name="description" content="ぴょん活マップは新しいサイトに移転しました。">
  <meta property="og:title" content="ぴょん活マップ｜サイト移転のお知らせ" />
  <meta property="og:description" content="ぴょん活マップは新しいサイトに移転しました。" />
  <meta property="og:type" content="website" />

  <title>ぴょん活マップ - サイト移転のお知らせ</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 60px 40px;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .icon {
      font-size: 80px;
      margin-bottom: 30px;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      color: #333;
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 700;
    }
    .message {
      color: #666;
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 30px;
    }
    .new-url {
      background: #f0f0f0;
      padding: 15px 20px;
      border-radius: 10px;
      margin: 30px 0;
      font-size: 20px;
      font-weight: 600;
      color: #667eea;
      word-break: break-all;
    }
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      margin-top: 10px;
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      color: white;
    }
    .countdown {
      margin-top: 30px;
      color: #999;
      font-size: 14px;
    }
    .countdown span {
      color: #667eea;
      font-weight: 700;
      font-size: 18px;
    }
    @media (max-width: 600px) {
      .container {
        padding: 40px 30px;
      }
      h1 {
        font-size: 26px;
      }
      .message {
        font-size: 16px;
      }
      .new-url {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏠</div>
    <h1>サイト移転のお知らせ</h1>
    <div class="message">
      いつもぴょん活マップをご利用いただきありがとうございます。<br>
      サービスをより快適にご利用いただくため、新しいサイトに移転しました。
    </div>
    <div class="new-url">
      https://map.usapo.net/
    </div>
    <a href="https://map.usapo.net/" class="button">新しいサイトへ移動</a>
    <div class="countdown">
      <span id="counter">10</span>秒後に自動的に移動します
    </div>
  </div>

  <script>
    let count = 10;
    const counterElement = document.getElementById('counter');
    
    const timer = setInterval(() => {
      count--;
      counterElement.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
      }
    }, 1000);
  </script>
</body>
</html>
